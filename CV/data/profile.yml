name: Dr Artur Czeszumski
headline: Data Scientist | Cognitive Neuroscientist | Lecturer
location: Warsaw, Poland
profile:
  Data scientist and cognitive neuroscientist with dual PhDs in Cognitive Science
  and Psychology. Works across football analytics, behavioral data,
  neurophysiology, and higher education. Combines rigorous experimental methods,
  statistical modelling, and data infrastructure to support decisions in both
  academic and applied settings.
focus:
  - Predictive modelling
  - Cognitive profiling
  - Behavioral and neurophysiological data
  - Experimental design
  - Data analysis and infrastructure
