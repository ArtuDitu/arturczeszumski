project:
  type: default
  output-dir: output
  pre-render:
    - python3 scripts/build_cv.py

format:
  pdf:
    documentclass: article
    pdf-engine: lualatex
    latex-auto-install: false
    classoption:
      - oneside
    include-in-header:
      - theme/preamble.tex
    keep-tex: true
    toc: false
    number-sections: false
    fig-cap-location: bottom

execute:
  echo: false
  warning: false
  error: false
